# Финальный конфиг сайта brocarparts.ru → /etc/nginx/sites-available/brocar
# (sites-enabled/brocar — симлинк на него). Воспроизводит текущую структуру с
# certbot-SSL и редиректом с 80, ДОБАВЛЯЯ кэш-location для /api/(catalog|product).
# Требует /etc/nginx/conf.d/brocar-cache.conf (зона brocar, map $brocar_no_cache,
# upstream brocar_next, gzip_types) — копируется из nginx-cache.conf.

server {
    server_name brocarparts.ru www.brocarparts.ru;

    # Кэшируемые ПУБЛИЧНЫЕ GET: каталог, карточка товара (/api/product/…),
    # картинки (/api/product-image). Только без cookie ($brocar_no_cache) —
    # корзина/профиль/админка/auth в общий кэш не попадают. TTL берётся из
    # Cache-Control ответа (s-maxage): меню — сутки, листинги — 10 мин, товар — 60 с.
    location ~ ^/api/(catalog|product) {
        proxy_pass http://brocar_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache brocar;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;                  # параллельные промахи → один backend-запрос
        proxy_no_cache $brocar_no_cache;      # не сохранять, если есть cookie
        proxy_cache_bypass $brocar_no_cache;  # не отдавать из кэша, если есть cookie
        add_header X-Cache-Status $upstream_cache_status always;  # MISS/HIT/UPDATING — для проверки
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl http2; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/brocarparts.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/brocarparts.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.brocarparts.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = brocarparts.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name brocarparts.ru www.brocarparts.ru;
    return 404; # managed by Certbot
}
