# Кэширующий слой nginx для brocarparts.ru (http-контекст).
# Положить на VPS в /etc/nginx/conf.d/brocar-cache.conf — он подключается из
# блока http{} основного /etc/nginx/nginx.conf (там есть `include conf.d/*.conf;`).
# Сами location-блоки, использующие этот кэш, — в server-блоке (см. nginx.conf).
#
# Зачем: перед Next сейчас голый reverse-proxy, поэтому Cache-Control (s-maxage),
# который ставят роуты каталога, НЕКОМУ исполнять — каждый аноним-запрос долетает
# до Node и удалённой Supabase (cold до 3.4с). Этот кэш держит повторные ответы в
# nginx (TTFB ~10мс), а proxy_cache_lock схлопывает параллельные промахи в один
# backend-запрос — убирает холодный старт для всех, кроме первого.

# Диск-кэш: 50МБ ключей в памяти, до 1ГБ файлов, чистка после суток простоя.
proxy_cache_path /var/cache/nginx/brocar levels=1:2 keys_zone=brocar:50m
                 max_size=1g inactive=24h use_temp_path=off;

# Любая непустая cookie (залогинен/корзина/сессия) → НЕ кэшировать этот запрос.
# Защищает от утечки персонализированных ответов между пользователями.
map $http_cookie $brocar_no_cache {
    default 0;
    "~."    1;
}

# Сжатие текстовых ответов (крупный JSON каталога особенно выигрывает на мобильной сети).
gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_types        application/json application/javascript text/css text/plain image/svg+xml;

# Keep-alive пул к Next — без переустановки TCP на каждый прокси-запрос.
upstream brocar_next {
    server 127.0.0.1:3000;
    keepalive 32;
}
