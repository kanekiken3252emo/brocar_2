# Nginx конфигурация для brocar (reference; живой конфиг на VPS дополнен certbot-SSL).
# Скопируй в /etc/nginx/sites-available/brocar, симлинк в sites-enabled.
# ВАЖНО: для кэширования сначала положи nginx-cache.conf в /etc/nginx/conf.d/
# (там определяются зона `brocar`, map `$brocar_no_cache`, gzip и upstream `brocar_next`).
# Подробности и шаги — в PERFORMANCE.md.

server {
    listen 80;
    server_name твой-домен.ru www.твой-домен.ru;  # <-- ЗАМЕНИ на свой домен!

    # Редирект на HTTPS (раскомментируй после получения SSL)
    # return 301 https://$server_name$request_uri;

    # Кэшируемые ПУБЛИЧНЫЕ GET: каталог, карточка товара (/api/product/…),
    # картинки (/api/product-image). Только без cookie ($brocar_no_cache из
    # nginx-cache.conf) — корзина/профиль/админка/auth не кэшируются.
    location ~ ^/api/(catalog|product) {
        proxy_pass http://brocar_next;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache brocar;
        proxy_cache_methods GET HEAD;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        # TTL берётся из Cache-Control ответа (s-maxage): меню — сутки, листинги
        # каталога — 10 мин, карточка товара — 60 с. Так каждый роут живёт в кэше
        # ровно столько, сколько задано в его заголовке.
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale updating error timeout http_500 http_502 http_503;
        proxy_cache_background_update on;
        proxy_cache_lock on;                  # параллельные промахи → один backend-запрос
        proxy_no_cache $brocar_no_cache;      # не сохранять, если есть cookie
        proxy_cache_bypass $brocar_no_cache;  # не отдавать из кэша, если есть cookie
        add_header X-Cache-Status $upstream_cache_status always;  # MISS/HIT/UPDATING — для проверки
    }

    location / {
        proxy_pass http://brocar_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

